<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>WELCOME</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0b0f1f;
        overflow: hidden;
        font-family: "Arial", sans-serif;
        height: 100vh;
        width: 100vw;
      }
      #canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #welcomeText {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-size: 68px;
        font-weight: bold;
        text-shadow:
          0 0 12px #00e5ff,
          0 0 35px #0099ff;
        pointer-events: none;
        z-index: 10;
        transition: opacity 0.7s ease;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="welcomeText">WELCOME</div>

    <script>
      // 全屏自动触发（去掉浏览器导航栏）
      function enterFullScreen() {
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen();
        } else if (document.documentElement.webkitRequestFullscreen) {
          document.documentElement.webkitRequestFullscreen();
        } else if (document.documentElement.msRequestFullscreen) {
          document.documentElement.msRequestFullscreen();
        }
      }

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const textEl = document.getElementById("welcomeText");

      let w = (canvas.width = window.innerWidth);
      let h = (canvas.height = window.innerHeight);

      const mouse = {
        x: w / 2,
        y: h / 2,
        radius: 120,
        gathered: [],
      };

      const CONFIG = {
        MAX_PARTICLES: 200,
        GATHER_RANGE: 70,
        MOUSE_FORCE: 0.08,
        FLOAT_SPEED: 0.35,
      };

      let particles = [];
      let isTextVisible = true;
      let rightHold = false;
      let fullGatherTimer = 0;

      class Particle {
        constructor(x, y, fromText = false) {
          this.x = x;
          this.y = y;
          this.size = fromText ? 2.0 : 1.6;
          this.speedX = (Math.random() - 0.5) * CONFIG.FLOAT_SPEED;
          this.speedY = (Math.random() - 0.5) * CONFIG.FLOAT_SPEED;
          this.isSmooth = Math.random() > 0.5;
          this.color = "#00e5ff";
          this.followTarget = null;
          this.isExploded = false;
        }

        update() {
          if (rightHold) {
            this.followTarget = { x: mouse.x, y: mouse.y };
          }

          if (this.followTarget) {
            const dx = this.followTarget.x - this.x;
            const dy = this.followTarget.y - this.y;
            this.x += dx * 0.18;
            this.y += dy * 0.18;
            if (Math.hypot(dx, dy) < 5) this.followTarget = null;
            return;
          }

          this.x += this.speedX;
          this.y += this.speedY;

          if (!this.isSmooth) {
            this.speedX *= 0.98;
            this.speedY *= 0.98;
          }

          if (this.x < 0 || this.x > w) this.speedX *= -0.8;
          if (this.y < 0 || this.y > h) this.speedY *= -0.8;

          const dist = Math.hypot(this.x - mouse.x, this.y - mouse.y);
          if (
            dist < CONFIG.GATHER_RANGE &&
            !isTextVisible &&
            !this.isExploded
          ) {
            if (!mouse.gathered.includes(this)) mouse.gathered.push(this);
            this.x += (mouse.x - this.x) * CONFIG.MOUSE_FORCE;
            this.y += (mouse.y - this.y) * CONFIG.MOUSE_FORCE;
          }
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.shadowColor = "#0099ff";
          ctx.shadowBlur = 14;
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

      function applyCollisionPush() {
        for (let i = 0; i < particles.length; i++) {
          let p1 = particles[i];
          for (let j = i + 1; j < particles.length; j++) {
            let p2 = particles[j];
            let d = Math.hypot(p1.x - p2.x, p1.y - p2.y);
            if (d < 10) {
              let m1 = Math.abs(p1.speedX) + Math.abs(p1.speedY) > 0.1;
              let m2 = Math.abs(p2.speedX) + Math.abs(p2.speedY) > 0.1;

              if (m1 && !m2) {
                p2.speedX += (p1.x - p2.x) * 0.025;
                p2.speedY += (p1.y - p2.y) * 0.025;
              }
              if (m2 && !m1) {
                p1.speedX += (p2.x - p1.x) * 0.025;
                p1.speedY += (p2.y - p1.y) * 0.025;
              }
            }
          }
        }
      }

      function textToParticles() {
        textEl.style.opacity = 0;
        setTimeout(() => {
          isTextVisible = false;
          particles = [];
          for (let i = 0; i < 150; i++) {
            const x = w / 2 + (Math.random() - 0.5) * 600;
            const y = h / 2 + (Math.random() - 0.5) * 350;
            particles.push(new Particle(x, y, true));
          }
        }, 700);
      }

      function regenWelcome() {
        if (isTextVisible) return;
        isTextVisible = true;
        fullGatherTimer = 0;
        mouse.gathered = [];
        particles = [];
        textEl.style.opacity = 1;
        setTimeout(textToParticles, 2000);
      }

      function connect() {
        for (let a = 0; a < particles.length; a++) {
          for (let b = a + 1; b < particles.length; b++) {
            const d = Math.hypot(
              particles[a].x - particles[b].x,
              particles[a].y - particles[b].y,
            );
            if (d < 130) {
              ctx.strokeStyle = `rgba(0,229,255,${0.35 - d / 380})`;
              ctx.lineWidth = 0.3;
              ctx.beginPath();
              ctx.moveTo(particles[a].x, particles[a].y);
              ctx.lineTo(particles[b].x, particles[b].y);
              ctx.stroke();
            }
          }
        }
      }

      function leftClick() {
        if (isTextVisible) return;

        if (mouse.gathered.length > 5) {
          const total = mouse.gathered.length;
          mouse.gathered.forEach((p, i) => {
            const angle = (i / total) * Math.PI * 2;
            const speed = Math.random() * 3 + 5;
            p.speedX = Math.cos(angle) * speed;
            p.speedY = Math.sin(angle) * speed;
            p.isExploded = true;
            setTimeout(() => (p.isExploded = false), 300);
          });
          mouse.gathered = [];
          fullGatherTimer = 0;
        } else {
          if (particles.length >= CONFIG.MAX_PARTICLES) return;
          for (let i = 0; i < 10; i++) {
            const angle = (i / 10) * Math.PI * 2;
            const x = mouse.x + Math.cos(angle) * 40;
            const y = mouse.y + Math.sin(angle) * 40;
            particles.push(new Particle(x, y));
          }
        }
      }

      function rightClick() {
        if (rightHold || isTextVisible || particles.length < 10) return;
        const list = [...particles]
          .sort(() => Math.random() - 0.5)
          .slice(0, 16);
        list.forEach((p) => (p.followTarget = { x: mouse.x, y: mouse.y }));
      }

      function checkAllGathered() {
        if (isTextVisible || particles.length < 20) return;
        const all = particles.every(
          (p) => Math.hypot(p.x - mouse.x, p.y - mouse.y) < 120,
        );
        if (all) {
          fullGatherTimer++;
          if (fullGatherTimer > 60) regenWelcome();
        } else {
          fullGatherTimer = 0;
        }
      }

      function animate() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach((p) => {
          p.update();
          p.draw();
        });
        applyCollisionPush();
        connect();
        checkAllGathered();
        requestAnimationFrame(animate);
      }

      // 鼠标点击页面任意位置 → 自动全屏，隐藏导航栏
      document.body.addEventListener("click", enterFullScreen);

      addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });
      addEventListener("click", leftClick);
      addEventListener("mousedown", (e) => {
        if (e.button === 2) rightHold = true;
      });
      addEventListener("mouseup", (e) => {
        if (e.button === 2) rightHold = false;
      });
      addEventListener("contextmenu", (e) => {
        e.preventDefault();
        rightClick();
      });
      addEventListener("resize", () => {
        w = canvas.width = innerWidth;
        h = canvas.height = innerHeight;
      });

      textToParticles();
      animate();
    </script>
  </body>
</html>
